<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دورة تعلم بايثون الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <header class="bg-blue-600 text-white py-12 shadow-lg text-center">
        <h1 class="text-4xl font-bold mb-2">دورة البرمجة بلغة بايثون</h1>
        <p class="text-blue-100">شروحات تفاعلية ومحاكيات تطبيقية</p>
    </header>

    <main class="max-w-4xl mx-auto p-6 -mt-10">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h2 class="text-2xl font-bold mb-6 border-b-2 border-blue-100 pb-2 text-blue-600">📜 قائمة الدروس والمحاكيات</h2>
            
            <div class="grid gap-4">
                
                <div class="group flex items-center justify-between p-4 border border-slate-200 rounded-xl hover:border-blue-400 hover:bg-blue-50 transition-all">
                    <div>
                        <h3 class="font-bold text-lg text-slate-700">الدرس الأول: Mutable vs Immutable</h3>
                        <p class="text-sm text-slate-500 text-right">فهم كيفية تعامل بايثون مع الكائنات في الذاكرة.</p>
                    </div>
                    <a href="index.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">ابدأ الدرس</a>
                </div>

                <div class="flex items-center justify-between p-4 border border-slate-100 rounded-xl opacity-60">
                    <div>
                        <h3 class="font-bold text-lg">الدرس الثاني: المتغيرات وأنواع البيانات</h3>
                        <p class="text-sm">قريباً...</p>
                    </div>
                    <span class="bg-slate-200 text-slate-500 px-4 py-2 rounded-lg text-sm">قيد التحضير</span>
                </div>

            </div>
        </div>

        <footer class="text-center mt-12 text-slate-400 text-sm">
            &copy; 2026 جميع الحقوق محفوظة للدورة التدريبية
        </footer>
    </main>

</body>
</html>
